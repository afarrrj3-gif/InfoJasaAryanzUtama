<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui, -apple-system, Arial;
}

body{
height:100vh;
display:flex;
flex-direction:column;
background:#0b141a;
color:white;
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:12px;
background:#0b141a;
padding:10px 14px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.back{
font-size:22px;
color:#7aa2ff;
cursor:pointer;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#e57373;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
}

.title{
display:flex;
flex-direction:column;
}

.name{
font-size:17px;
font-weight:600;
}

.status{
font-size:12px;
opacity:0.6;
}

.menu{
margin-left:auto;
font-size:20px;
opacity:0.8;
}

/* CHAT AREA */

.chat{
flex:1;
overflow-y:auto;
padding:14px;
display:flex;
flex-direction:column;
gap:6px;
background-image:url("https://res.cloudinary.com/dtdodhqqi/image/upload/v1771310542/c36725a5a2a254a5df8c7dd4bdaa05af_v3tzna.jpg");
background-size:cover;
}

/* DATE */

.date{
align-self:center;
background:rgba(0,0,0,0.4);
padding:5px 10px;
border-radius:10px;
font-size:12px;
margin:8px 0;
}

/* BUBBLE */

.msg{
max-width:75%;
padding:8px 10px;
border-radius:10px;
font-size:14px;
display:flex;
flex-direction:column;
}

.user{
align-self:flex-end;
background:#1f6f5d;
color:white;
}

.bot{
align-self:flex-start;
background:#202c33;
}

.time{
font-size:11px;
opacity:0.7;
align-self:flex-end;
margin-top:2px;
}

/* INPUT BAR */

.inputbar{
display:flex;
align-items:center;
gap:8px;
background:#202c33;
padding:8px 10px;
}

.smile{
font-size:22px;
opacity:0.8;
}

.input{
flex:1;
background:#2a3942;
border:none;
outline:none;
padding:10px 12px;
border-radius:20px;
color:white;
font-size:14px;
}

.attach{
font-size:20px;
opacity:0.8;
}

.mic{
width:36px;
height:36px;
border-radius:50%;
background:#2a7fff;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

</style>
</head>

<body>

<div class="header">
<div class="back">←</div>

<div class="avatar">A</div>

<div class="title">
<div class="name">Aeyanz</div>
<div class="status">bot</div>
</div>

<div class="menu">⋮</div>
</div>

<div id="chat" class="chat">

<div class="date">February 19</div>

</div>

<div class="inputbar">

<div class="smile">😊</div>

<input id="text" class="input" placeholder="Message">

<div class="attach">📎</div>

<div class="mic">🎤</div>

</div>

<script>

const chat=document.getElementById("chat")

function time(){
let d=new Date()
let h=d.getHours().toString().padStart(2,"0")
let m=d.getMinutes().toString().padStart(2,"0")
return h+":"+m
}

function send(){

const input=document.getElementById("text")

if(!input.value.trim()) return

const msg=document.createElement("div")
msg.className="msg user"

msg.innerHTML=`
${input.value}
<div class="time">${time()} ✓✓</div>
`

chat.appendChild(msg)

chat.scrollTop=chat.scrollHeight

input.value=""

}

document.getElementById("text").addEventListener("keydown",e=>{
if(e.key==="Enter") send()
})

</script>

</body>
</html>
