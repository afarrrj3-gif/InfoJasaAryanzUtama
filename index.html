<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system;
}

body{
height:100vh;
display:flex;
flex-direction:column;
background:#0b141a;
color:white;
overflow:hidden;
}

/* HEADER */

.header{

position:fixed;
top:0;
left:0;
right:0;

height:60px;

display:flex;
align-items:center;

padding:0 14px;

background:#0b141a;

z-index:5;

}

.avatar{

width:40px;
height:40px;

border-radius:50%;

background:#e57373;

display:flex;
align-items:center;
justify-content:center;

font-weight:600;

margin-right:10px;

}

.name{

font-size:17px;
font-weight:600;

}

.status{

font-size:12px;
opacity:0.6;

}

.profile{

display:flex;
flex-direction:column;

}

.menu{

margin-left:auto;

font-size:20px;

}

/* CHAT */

.chat{

position:absolute;

top:60px;
bottom:90px;
left:0;
right:0;

overflow-y:auto;

padding:15px;

display:flex;
flex-direction:column;

gap:8px;

background-image:url("https://res.cloudinary.com/dtdodhqqi/image/upload/v1771310542/c36725a5a2a254a5df8c7dd4bdaa05af_v3tzna.jpg");

background-size:cover;

}

/* DATE */

.date{

align-self:center;

background:rgba(0,0,0,0.4);

padding:4px 10px;

border-radius:10px;

font-size:12px;

margin:6px 0;

}

/* BUBBLE */

.msg{

display:inline-flex;
flex-direction:column;

max-width:75%;

padding:8px 10px;

border-radius:12px;

font-size:14px;

animation:pop 0.2s ease;

}

.user{

align-self:flex-end;

background:#1f6f5d;

}

.bot{

align-self:flex-start;

background:#202c33;

}

/* FOOTER TIME */

.meta{

display:flex;
align-items:center;
justify-content:flex-end;

gap:4px;

font-size:11px;

opacity:0.8;

margin-top:3px;

}

/* ANIMATION */

@keyframes pop{

from{
transform:scale(.9);
opacity:0;
}

}

/* FLOAT INPUT */

.inputwrap{

position:fixed;

bottom:18px;
left:12px;
right:12px;

display:flex;
align-items:center;

gap:8px;

background:#202c33;

padding:8px;

border-radius:18px;

box-shadow:0 6px 20px rgba(0,0,0,0.4);

backdrop-filter:blur(8px);

}

/* INPUT */

input{

flex:1;

border:none;

outline:none;

background:transparent;

color:white;

font-size:15px;

padding:6px;

}

/* SEND BUTTON */

.send{

width:38px;
height:38px;

border-radius:50%;

background:#2a7fff;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

font-size:18px;

}

</style>
</head>

<body>

<div class="header">

<div class="avatar">A</div>

<div class="profile">
<div class="name">Aeyanz</div>
<div class="status">bot</div>
</div>

<div class="menu">⋮</div>

</div>

<div id="chat" class="chat">

<div class="date">February 19</div>

</div>

<div class="inputwrap">

<input id="text" placeholder="Message">

<div class="send" onclick="send()">➤</div>

</div>

<script>

const chat=document.getElementById("chat")
const input=document.getElementById("text")

function time(){

let d=new Date()

let h=d.getHours().toString().padStart(2,"0")
let m=d.getMinutes().toString().padStart(2,"0")

return h+":"+m

}

function send(){

let value=input.value.trim()

if(!value) return

const msg=document.createElement("div")

msg.className="msg user"

msg.innerHTML=`
<div>${value}</div>
<div class="meta">${time()} ✓✓</div>
`

chat.appendChild(msg)

chat.scrollTop=chat.scrollHeight

input.value=""

input.focus()

}

input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault()
send()
}
})

</script>

</body>
</html>
