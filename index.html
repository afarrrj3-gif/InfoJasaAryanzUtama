<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
height:100dvh;
background:#0b141a;
overflow:hidden;
}

/* HEADER */

.header{

position:fixed;
top:0;
left:0;
right:0;

height:60px;

display:flex;
align-items:center;

padding:10px 14px;

background:#0b141a;

z-index:100;

}

.avatar{

width:40px;
height:40px;

border-radius:50%;

margin-right:10px;

object-fit:cover;

}

.profile{

display:flex;
flex-direction:column;

}

.name{

font-size:16px;
font-weight:600;
color:white;

}

.status{

font-size:12px;
opacity:.6;
color:white;

}

.menu{

margin-left:auto;
font-size:20px;
color:white;

}

/* CHAT */

.chat{

position:fixed;

top:60px;
bottom:80px;
left:0;
right:0;

overflow-y:auto;

padding:10px;

display:flex;
flex-direction:column;

gap:3px;

background-image:url("https://res.cloudinary.com/dtdodhqqi/image/upload/v1771310542/c36725a5a2a254a5df8c7dd4bdaa05af_v3tzna.jpg");

background-size:cover;

}

/* DATE */

.date{

align-self:center;

background:rgba(0,0,0,.35);

padding:3px 10px;

border-radius:10px;

font-size:12px;

color:white;

margin-bottom:4px;

}

/* BUBBLE */

.msg{

align-self:flex-end;

background:#1f6f5d;

border-radius:10px;

padding:5px 8px;

max-width:76%;

font-size:14px;

color:white;

animation:msgIn .18s cubic-bezier(.2,.8,.2,1);

}

.row{

display:inline-flex;

align-items:flex-end;

gap:6px;

flex-wrap:wrap;

}

.text{

word-break:break-word;

}

.meta{

font-size:11px;

opacity:.8;

white-space:nowrap;

}

/* ANIMATION */

@keyframes msgIn{

0%{
transform:translateY(12px) scale(.92);
opacity:0;
}

100%{
transform:translateY(0) scale(1);
opacity:1;
}

}

/* FLOAT INPUT */

.inputWrap{

position:fixed;

bottom:16px;
left:10px;
right:10px;

display:flex;
align-items:center;

gap:8px;

padding:8px 10px;

background:#202c33;

border-radius:22px;

box-shadow:0 10px 30px rgba(0,0,0,.45);

z-index:200;

}

/* INPUT */

input{

flex:1;

border:none;
outline:none;

background:transparent;

color:white;

font-size:15px;

}

/* SEND */

.send{

width:34px;
height:34px;

border-radius:50%;

background:#2a7fff;

display:flex;
align-items:center;
justify-content:center;

font-size:16px;

cursor:pointer;

transition:.15s;

}

.send:active{

transform:scale(.85);

}

</style>

</head>

<body>

<div class="header">

<img class="avatar"
src="https://res.cloudinary.com/dtdodhqqi/image/upload/v1766845910/IMG-20251128-WA0094_1_rrrhdn.jpg">

<div class="profile">

<div class="name">AryanzUtama</div>

<div class="status">bot</div>

</div>

<div class="menu">⋮</div>

</div>

<div id="chat" class="chat">

<div id="date" class="date"></div>

</div>

<div class="inputWrap">

<input id="msg" placeholder="Message">

<div class="send" onclick="send()">➤</div>

</div>

<script>

const chat=document.getElementById("chat")
const input=document.getElementById("msg")

/* DATE AUTO */

const d=new Date()

const months=[
"January","February","March","April",
"May","June","July","August",
"September","October","November","December"
]

document.getElementById("date").innerText=
months[d.getMonth()]+" "+d.getDate()

/* TIME */

function time(){

let now=new Date()

return now.getHours().toString().padStart(2,"0")+":"+
now.getMinutes().toString().padStart(2,"0")

}

/* SEND */

function send(){

let val=input.value.trim()

if(!val) return

const msg=document.createElement("div")

msg.className="msg"

msg.innerHTML=`
<div class="row">
<span class="text">${val}</span>
<span class="meta">${time()} ✓✓</span>
</div>
`

chat.appendChild(msg)

chat.scrollTo({
top:chat.scrollHeight,
behavior:"smooth"
})

input.value=""
input.focus()

}

input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault()
send()
}
})

</script>

</body>
</html>
