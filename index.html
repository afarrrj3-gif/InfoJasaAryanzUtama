<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
height:100vh;
background:#0b141a;
overflow:hidden;
color:white;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
right:0;
height:64px;
display:flex;
align-items:center;
padding:10px 14px;
background:#0b141a;
z-index:10;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
margin-right:10px;
object-fit:cover;
}

.profile{
display:flex;
flex-direction:column;
}

.name{
font-size:16px;
font-weight:600;
}

.status{
font-size:12px;
opacity:.6;
}

.menu{
margin-left:auto;
font-size:20px;
opacity:.8;
}

/* CHAT AREA */

.chat{
position:absolute;
top:64px;
bottom:100px;
left:0;
right:0;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:6px;

background-image:url("https://res.cloudinary.com/dtdodhqqi/image/upload/v1771310542/c36725a5a2a254a5df8c7dd4bdaa05af_v3tzna.jpg");
background-size:cover;
}

/* DATE */

.date{
align-self:center;
background:rgba(0,0,0,.35);
padding:4px 10px;
border-radius:10px;
font-size:12px;
margin:6px 0;
}

/* BUBBLE */

.msg{
display:inline-flex;
align-self:flex-end;
background:#1f6f5d;
border-radius:10px;
padding:6px 8px;
max-width:78%;
font-size:14px;
animation:msgIn .25s cubic-bezier(.2,.8,.2,1);
}

.row{
display:inline-flex;
align-items:flex-end;
gap:6px;
flex-wrap:wrap;
}

.text{
word-break:break-word;
}

.meta{
font-size:11px;
opacity:.8;
white-space:nowrap;
}

@keyframes msgIn{
from{
transform:translateY(8px) scale(.96);
opacity:0;
}
to{
transform:translateY(0) scale(1);
opacity:1;
}
}

/* FLOAT INPUT */

.inputWrap{
position:fixed;
bottom:18px;
left:10px;
right:10px;
display:flex;
align-items:center;
gap:8px;
padding:8px 10px;
background:#202c33;
border-radius:22px;
box-shadow:0 10px 30px rgba(0,0,0,.45);
z-index:20;
}

input{
flex:1;
border:none;
outline:none;
background:transparent;
color:white;
font-size:15px;
padding:6px;
}

.send{
width:34px;
height:34px;
border-radius:50%;
background:#2a7fff;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
cursor:pointer;
transition:.2s;
}

.send:active{
transform:scale(.9);
}

</style>
</head>

<body>

<div class="header">

<img class="avatar"
src="https://res.cloudinary.com/dtdodhqqi/image/upload/v1766845910/IMG-20251128-WA0094_1_rrrhdn.jpg">

<div class="profile">
<div class="name">AryanzUtama</div>
<div class="status">bot</div>
</div>

<div class="menu">⋮</div>

</div>

<div id="chat" class="chat">

<div class="date">February 19</div>

</div>

<div class="inputWrap">

<input id="msg" placeholder="Message">

<div class="send" onclick="send()">➤</div>

</div>

<script>

const chat=document.getElementById("chat")
const input=document.getElementById("msg")

function time(){
let d=new Date()
return d.getHours().toString().padStart(2,"0")+":"+
d.getMinutes().toString().padStart(2,"0")
}

function send(){

let val=input.value.trim()
if(!val) return

const msg=document.createElement("div")
msg.className="msg"

msg.innerHTML=`
<div class="row">
<span class="text">${val}</span>
<span class="meta">${time()} ✓✓</span>
</div>
`

chat.appendChild(msg)

chat.scrollTo({
top:chat.scrollHeight,
behavior:"smooth"
})

input.value=""
input.focus()

}

input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault()
send()
}
})

</script>

</body>
</html>
